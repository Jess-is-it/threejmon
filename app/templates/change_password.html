{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block header_title %}Change Password{% endblock %}
{% block header_badge %}
  <span class="badge bg-orange-lt text-orange header-icon-badge"><i class="ti ti-key"></i></span>
{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Update your password</h3>
        </div>
        <form method="post" action="/account/change-password">
          <div class="card-body">
            {% if message %}
              <div class="alert alert-info auto-dismiss-alert">{{ message }}</div>
            {% endif %}
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <input class="form-control" type="password" name="current_password" required />
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input class="form-control" type="password" name="new_password" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm New Password</label>
              <input class="form-control" type="password" name="confirm_password" required />
            </div>
          </div>
          <div class="card-footer d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">Save Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
